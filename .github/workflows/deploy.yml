name: Deploy Otterbot

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel an in-progress deploy — wait for it to finish first
concurrency:
  group: deploy-otterbot
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Docker Buildx (enables layer caching) ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GHCR ────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Compute image tags ─────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 5. Build Docker image and push to GHCR ────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Deploy slash commands (runs built image on runner, deploys to all guilds)
      # EUPHORIC_API_KEY and DATABASE_URL are required by env.ts validation but not
      # actually used during command registration — placeholder values satisfy Zod.
      - name: Deploy slash commands
        run: |
          docker run --rm \
            -e DISCORD_BOT_TOKEN="${{ secrets.DISCORD_BOT_TOKEN }}" \
            -e DISCORD_CLIENT_ID="${{ secrets.DISCORD_CLIENT_ID }}" \
            -e DATABASE_URL="postgresql://placeholder/placeholder" \
            -e EUPHORIC_API_KEY="placeholder" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            node dist/bot/registerCommands.js

      # ── 7. Deploy to VPS ──────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd ${{ secrets.PROJECT_DIR }}

            # Pull latest source (for docker-compose.yml updates)
            git fetch --all
            git reset --hard origin/main

            # Pull the new image and restart
            BOT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
              docker compose pull otterbot

            BOT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
              docker compose up -d --remove-orphans

            # Wait for container to be healthy
            sleep 10
            if ! docker compose ps otterbot | grep -q "running\|Up"; then
              echo "ERROR: otterbot container is not running"
              docker compose logs otterbot --tail=30
              exit 1
            fi

            echo "✓ otterbot is running."
            docker compose ps otterbot

      # ── 8. Notify Discord — success ───────────────────────────────────────────
      - name: Notify success
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Otterbot deployed\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 5763719,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR}\" }
              }]
            }"

      # ── 9. Notify Discord — failure ───────────────────────────────────────────
      - name: Notify failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Otterbot deploy FAILED\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 15548997,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR} — check Actions logs\" }
              }]
            }"
